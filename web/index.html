    <!-- brand-green first paint: iOS often ignores startup images, so the pre-app frame must not be white -->
    <style>html{background-color:#064834}</style>
    <script>
      // apply saved theme before first paint (next-themes stores it under "theme")
      try {
        const t = localStorage.getItem('theme')
        if (t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches))
          document.documentElement.classList.add('dark')
      } catch {}
    </script>
