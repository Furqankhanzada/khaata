services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: ${DB_PASSWORD:-finance}
    ports:
      - "127.0.0.1:5433:5432" # host access for local dev only
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      # localhost-only: the public front door is the Cloudflare tunnel (internal app:3000);
      # this host port exists just for local access from this machine
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://finance:${DB_PASSWORD:-finance}@db:5432/finance
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${APP_URL:-http://localhost:3000}
      TZ: Asia/Karachi
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Public HTTPS via Cloudflare Tunnel — opt-in: docker compose --profile public up -d
  # (create the tunnel in Cloudflare Zero Trust, point its hostname at http://app:3000,
  #  put the connector token in .env as TUNNEL_TOKEN — see README "Going public")
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN:-}
    depends_on:
      - app
    restart: unless-stopped
    profiles: [public]

volumes:
  pgdata:
